<head>

                <span class="nav-logo-text">BAHAW</span>
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li>
                    <a href="cart.html" class="nav-cart">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>
                        <span class="cart-badge"></span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- CART PAGE -->
    <section class="cart-page">
        <div class="container">
            <h1 class="page-title" style="margin-bottom: 32px;">Your Cart</h1>
            <div id="cartContent">
                <!-- Loaded by JS -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <div class="footer-logo">BAHAW Studio</div>
                    <p>Cebuano-themed apparel that celebrates Bisaya culture.</p>
                </div>
                <div class="footer-col">
                    <h4>Shop</h4>
                    <a href="shop.html?category=caps">Caps</a>
                    <a href="shop.html?category=beanies">Beanies</a>
                    <a href="shop.html?category=tshirts">T-Shirts</a>
                </div>
                <div class="footer-col">
                    <h4>Company</h4>
                    <a href="about.html">About Us</a>
                    <a href="contact.html">Contact</a>
                    <a href="terms.html">Terms &amp; Privacy</a>
                </div>
                <div class="footer-col">
                    <h4>Connect</h4>
                    <a href="https://www.etsy.com/shop/BahawStudio" target="_blank" rel="noopener">Etsy Shop</a>
                    <a href="mailto:info@cebulandmarket.com">Email Us</a>
                </div>
            </div>
            <div class="footer-bottom">
                <span>&copy; 2026 BAHAW Studio. All rights reserved.</span>
                <a href="terms.html">Terms &amp; Privacy</a>
            </div>
        </div>
    </footer>

    <script src="data/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        function renderCartPage() {
            var container = document.getElementById('cartContent');
            if (!container) return;

            var cart = getCart();

            if (cart.length === 0) {
                container.innerHTML =
                    '<div class="cart-empty">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>' +
                        '<h2>Your cart is empty</h2>' +
                        '<p>Looks like you haven\'t added anything yet.</p>' +
                        '<a href="shop.html" class="btn btn-primary">Browse Products</a>' +
                    '</div>';
                return;
            }

            var itemsHTML = '<div class="cart-items">';
            for (var i = 0; i < cart.length; i++) {
                var item = cart[i];
                var img = item.photo_url
                    ? '<img src="' + item.photo_url + '" alt="' + item.name + '">'
                    : '';
                itemsHTML +=
                    '<div class="cart-item">' +
                        '<div class="cart-item-img">' + img + '</div>' +
                        '<div class="cart-item-details">' +
                            '<div class="cart-item-name">' + item.name + '</div>' +
                            '<div class="cart-item-meta">' + (item.color ? item.color : '') + (item.color && item.size ? ' / ' : '') + (item.size ? item.size : '') + '</div>' +
                            '<div class="cart-item-controls">' +
                                '<div class="qty-selector">' +
                                    '<button class="qty-btn" onclick="updateCartItem(' + i + ', -1)">-</button>' +
                                    '<input type="number" class="qty-input" value="' + item.qty + '" readonly>' +
                                    '<button class="qty-btn" onclick="updateCartItem(' + i + ', 1)">+</button>' +
                                '</div>' +
                                '<button class="cart-item-remove" onclick="removeCartItem(' + i + ')">Remove</button>' +
                            '</div>' +
                        '</div>' +
                        '<div class="cart-item-price">' + formatPrice(item.price * item.qty) + '</div>' +
                    '</div>';
            }
            itemsHTML += '</div>';

            var subtotal = getCartSubtotal();
            var shipping = getShipping();
            var total = getCartTotal();

            var summaryHTML =
                '<div class="cart-summary">' +
                    '<h3>Order Summary</h3>' +
                    '<div class="cart-summary-row"><span>Subtotal</span><span>' + formatPrice(subtotal) + '</span></div>' +
                    '<div class="cart-summary-row"><span>Shipping</span><span>' + (shipping === 0 ? 'FREE' : formatPrice(shipping)) + '</span></div>' +
                    '<div class="cart-summary-row total"><span>Total</span><span>' + formatPrice(total) + '</span></div>' +
                    '<a href="checkout.html" class="btn btn-primary btn-full btn-lg">Proceed to Checkout</a>' +
                    (subtotal < FREE_SHIPPING_MIN ? '<div class="cart-shipping-note">Free shipping on orders over ' + formatPrice(FREE_SHIPPING_MIN) + '</div>' : '<div class="cart-shipping-note">You qualify for free shipping!</div>') +
                '</div>';

            container.innerHTML = '<div class="cart-layout">' + itemsHTML + summaryHTML + '</div>';
        }

        function updateCartItem(index, delta) {
            var cart = getCart();
            if (index >= 0 && index < cart.length) {
                var newQty = cart[index].qty + delta;
                if (newQty <= 0) {
                    removeFromCart(index);
                } else {
                    updateCartQuantity(index, newQty);
                }
                renderCartPage();
            }
        }

        function removeCartItem(index) {
            removeFromCart(index);
            renderCartPage();
        }

        document.addEventListener('DOMContentLoaded', renderCartPage);
    </script>
</body>
</html>
